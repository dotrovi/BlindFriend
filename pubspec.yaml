name: flutter_blindfriend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_ui_auth: ^3.0.1
  cloud_firestore: ^6.3.0
  shared_preferences: ^2.2.2
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  mobile_scanner: ^7.2.0
  http: ^1.6.0
  camera: ^0.11.2+1
  google_mlkit_object_detection: ^0.15.1
  path_provider: ^2.1.5
  geolocator: ^13.0.2
  youtube_player_flutter: ^9.1.1
  pdf: ^3.11.1
  printing: ^5.13.1
  web: ^1.1.0

  # a bug where brightness was not found in the latest version of firebase_ui_shared (or something similar), so downgrade it to following if it happens
    # firebase_core: ^3.10.0
    # firebase_auth: ^5.7.0
    # firebase_ui_auth: ^1.16.0
    # firebase_ui_shared: 1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
